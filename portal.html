<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b7a42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Portal do Cliente — AnamneseApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/config.js"></script>
<style>
:root{
  --bg:#f7f5f0;--white:#fff;--ink:#1a1814;--muted:#9a9588;
  --border:#e4e0d8;--olive:#6b7a42;--gold:#a8893a;--cream:#f0ece3;--danger:#c0392b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);}
button{font-family:'DM Sans',sans-serif;}

/* ── ESTADOS FULL ── */
.full-center{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:var(--bg);z-index:200;}
.logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;color:var(--olive);margin-bottom:8px;}
.logo span{font-style:normal;color:var(--ink);}
.spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--olive);border-radius:50%;animation:sp .7s linear infinite;margin:24px auto 0;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── LOGIN ── */
.portal-login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);z-index:200;overflow-y:auto;}
.portal-login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.portal-login-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;color:#6b7a42;}
.portal-login-logo span{font-style:normal;color:#1a1814;}
.portal-login-title{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;color:#1a1814;margin:16px 0 6px;}
.portal-login-sub{font-size:13px;color:#9a9588;margin-bottom:28px;line-height:1.5;}
.portal-field{margin-bottom:16px;}
.portal-field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9a9588;margin-bottom:7px;}
.portal-field input{width:100%;padding:13px 14px;background:#f7f5f0;border:1.5px solid #e4e0d8;border-radius:10px;font-size:14px;color:#1a1814;outline:none;transition:border-color .2s;min-height:44px;}
.portal-field input:focus{border-color:#6b7a42;}
.portal-hint{font-size:11px;color:#9a9588;margin-top:5px;line-height:1.4;}
.btn-portal-login{width:100%;padding:14px;background:#6b7a42;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;margin-top:8px;transition:opacity .2s;}
.btn-portal-login:hover{opacity:.88;}
.btn-portal-login:disabled{opacity:.6;cursor:not-allowed;}
.portal-login-msg{font-size:13px;text-align:center;margin-top:14px;min-height:18px;}
.portal-login-msg.err{color:#c0392b;}

/* ── APP SHELL ── */
#appShell{display:none;flex-direction:column;height:100%;height:100dvh;}

/* ── HEADER ── */
.p-header{background:var(--ink);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.p-header-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;color:#fff;}
.p-header-logo span{font-style:normal;color:var(--olive);}
.p-header-right{display:flex;align-items:center;gap:10px;}
.p-client-name{font-size:12px;color:rgba(255,255,255,.55);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,.65);cursor:pointer;min-height:32px;transition:all .2s;}
.btn-logout:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ── CONTEÚDO SCROLLÁVEL ── */
.p-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.p-page{display:none;max-width:720px;margin:0 auto;padding:16px 14px 20px;}
.p-page.active{display:block;}

/* ── NAV BAR ── */
.p-nav{background:#fff;border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.p-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--muted);min-height:56px;transition:color .15s;position:relative;}
.p-nav-btn.active{color:var(--olive);}
.p-nav-btn svg{width:22px;height:22px;stroke-width:1.8;}
.p-nav-lbl{font-size:10px;font-weight:600;letter-spacing:.3px;}
.p-nav-dot{position:absolute;top:8px;right:calc(50% - 16px);width:6px;height:6px;border-radius:50%;background:var(--olive);display:none;}
.p-nav-dot.show{display:block;}

/* ── CARDS GENÉRICOS ── */
.p-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.p-card:last-child{margin-bottom:0;}
.p-card-title{font-family:'Instrument Serif',serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:14px;}
.p-section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* ── EMPTY STATES ── */
.empty-p{text-align:center;padding:32px 0;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:5px;}
.empty-sub{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── QUICK STATS ── */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.quick-card{background:#fff;border-radius:12px;padding:12px 10px;text-align:center;border:1px solid var(--border);}
.quick-val{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);line-height:1;}
.quick-unit{font-size:10px;color:var(--muted);margin-top:2px;}
.quick-lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px;margin-top:5px;text-transform:uppercase;}

/* ── TREINOS ── */
.workout-card{background:#fff;border-radius:14px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);}
.workout-card:last-child{margin-bottom:0;}
.workout-hd{padding:14px 16px;border-bottom:1px solid var(--cream);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.workout-title{font-family:'Instrument Serif',serif;font-size:17px;color:var(--ink);}
.workout-periodo{font-size:11px;color:var(--muted);margin-top:3px;}
.workout-type{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(107,122,66,.1);color:var(--olive);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.plan-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;}
.plan-tabs::-webkit-scrollbar{display:none;}
.plan-tab{padding:10px 16px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-height:40px;transition:all .2s;}
.plan-tab.active{color:var(--olive);border-bottom-color:var(--olive);}
.plan-body{padding:14px 16px;}
.block-wrap{margin-bottom:16px;}
.block-wrap:last-child{margin-bottom:0;}
.block-lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--olive);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.block-bar{width:3px;height:13px;border-radius:2px;background:var(--olive);flex-shrink:0;}
.ex-card{padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;}
.ex-card:last-child{margin-bottom:0;}
.ex-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px;}
.ex-params{display:flex;gap:5px;flex-wrap:wrap;}
.ex-param{padding:3px 9px;background:#fff;border-radius:20px;font-size:11px;color:var(--ink);border:1px solid var(--border);}
.ex-notes{font-size:11px;color:var(--muted);margin-top:5px;font-style:italic;}

/* ── AVALIAÇÕES ── */
.aval-item{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.aval-item:last-child{margin-bottom:0;}
.aval-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;transition:background .15s;gap:10px;}
.aval-hd:hover{background:var(--cream);}
.aval-date{font-size:13px;font-weight:600;color:var(--ink);}
.aval-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.aval-chev{font-size:16px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.aval-chev.open{transform:rotate(180deg);}
.aval-body{display:none;padding:14px;border-top:1px solid var(--border);background:var(--bg);}
.aval-body.open{display:block;}
.meas-sec{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--olive);margin:14px 0 8px;}
.meas-sec:first-child{margin-top:0;}
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.meas-item{padding:10px 12px;background:#fff;border-radius:10px;border:1px solid var(--border);}
.meas-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.meas-val{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);display:flex;align-items:baseline;gap:3px;line-height:1.1;}
.meas-unit{font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;}
.meas-classif{font-size:11px;margin-top:3px;font-weight:600;}
.cl-baixo{color:#3b6ea5;}.cl-normal{color:#6b7a42;}.cl-sobre{color:#a8893a;}.cl-obesidade{color:#c0392b;}
.quick-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
@media(min-width:440px){.quick-metrics{grid-template-columns:repeat(3,1fr);}}
.qm-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
.qm-val{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);}
.qm-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--olive);border-radius:8px;font-size:12px;font-weight:600;color:var(--olive);background:none;cursor:pointer;transition:all .2s;margin-top:12px;}
.btn-pdf:hover{background:var(--olive);color:#fff;}

/* ── EVOLUÇÃO ── */
.metric-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.metric-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;min-height:32px;}
.metric-chip.active{background:var(--olive);border-color:var(--olive);color:#fff;}
.metric-chip:hover:not(.active){border-color:var(--olive);color:var(--olive);}
.chart-wrap{position:relative;height:220px;}
@media(min-width:600px){.chart-wrap{height:280px;}}
.chart-empty{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;}

/* ── METAS ── */
.goal-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.goal-card:last-child{margin-bottom:0;}
.goal-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;}
.goal-cat{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.gc-peso{background:rgba(70,100,150,.1);color:#4664a0;}
.gc-gordura{background:rgba(200,100,20,.1);color:#c86414;}
.gc-circunferencia{background:rgba(130,50,150,.1);color:#823296;}
.gc-vo2{background:rgba(107,122,66,.12);color:var(--olive);}
.gc-forca{background:rgba(192,57,43,.1);color:#c0392b;}
.gc-outro{background:var(--cream);color:var(--muted);}
.prog-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.prog-fill{height:100%;border-radius:3px;transition:width .5s;}
.gp-low{background:#c0392b;}.gp-mid{background:var(--gold);}.gp-high{background:var(--olive);}
.prog-vals{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}

/* ── PERFIL ── */
.data-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px;}
.data-row:last-child{border-bottom:none;}
.data-key{color:var(--muted);flex-shrink:0;}
.data-val{color:var(--ink);font-weight:500;text-align:right;word-break:break-word;}
.anam-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
.anam-row:last-child{border-bottom:none;}
.badge-s{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;}
.s-nova{background:rgba(107,122,66,.12);color:var(--olive);}
.s-lida{background:rgba(154,149,136,.12);color:var(--muted);}
.s-arquivada{background:rgba(26,24,20,.07);color:var(--ink);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="portal-login-wrap">
    <div class="portal-login-card">
      <div class="portal-login-logo">Anamnese<span>App</span></div>
      <div class="portal-login-title">Bem-vindo ao seu portal</div>
      <div class="portal-login-sub">Acesse seus dados de treino e evolução</div>
      <div class="portal-field">
        <label>Email</label>
        <input type="email" id="loginEmail" autocomplete="email" inputmode="email" placeholder="seu@email.com">
      </div>
      <div class="portal-field">
        <label>Senha</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Data de nascimento (DDMMAA)" onkeydown="if(event.key==='Enter')doPortalLogin()">
        <div class="portal-hint">Ex: nasceu em 28/05/1998 → senha <strong>280598</strong></div>
      </div>
      <button class="btn-portal-login" id="btnLogin" onclick="doPortalLogin()">Entrar</button>
      <div class="portal-login-msg" id="loginMsg"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="full-center">
  <div class="logo">Anamnese<span>App</span></div>
  <div style="font-size:13px;color:var(--muted);margin-top:4px">Portal do Cliente</div>
  <div class="spin"></div>
</div>

<!-- APP SHELL -->
<div id="appShell">

  <!-- Header -->
  <header class="p-header">
    <div class="p-header-logo">Anamnese<span>App</span></div>
    <div class="p-header-right">
      <div class="p-client-name" id="pClientName"></div>
      <button class="btn-logout" onclick="portalLogout()">Sair</button>
    </div>
  </header>

  <!-- Conteúdo com scroll -->
  <div class="p-content" id="pContent">

    <!-- ① TREINOS -->
    <div class="p-page active" id="pgTreinos">
      <div class="quick-grid" id="secQuick" style="display:none"></div>
      <div id="secTreinos"><div class="empty-p"><div class="spin" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ② AVALIAÇÕES -->
    <div class="p-page" id="pgAvals">
      <div id="secAvals"><div class="empty-p"><div class="spin" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ③ EVOLUÇÃO -->
    <div class="p-page" id="pgEvolucao">
      <div class="p-card">
        <div class="p-card-title">Minha evolução</div>
        <div class="metric-chips" id="metricSelP">
          <button class="metric-chip active" onclick="loadPortalChart('peso',this)">Peso</button>
          <button class="metric-chip" onclick="loadPortalChart('gordura',this)">% Gordura</button>
          <button class="metric-chip" onclick="loadPortalChart('imc',this)">IMC</button>
          <button class="metric-chip" onclick="loadPortalChart('cintura',this)">Cintura</button>
          <button class="metric-chip" onclick="loadPortalChart('vo2max',this)">VO2 Máx</button>
          <button class="metric-chip" onclick="loadPortalChart('preensao',this)">Preensão</button>
        </div>
        <div class="chart-wrap"><canvas id="portalChart"></canvas></div>
        <div class="chart-empty" id="portalChartEmpty" style="display:none"></div>
      </div>
    </div>

    <!-- ④ METAS -->
    <div class="p-page" id="pgMetas">
      <div id="secMetas"><div class="empty-p"><div class="spin" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ⑤ PERFIL -->
    <div class="p-page" id="pgPerfil">
      <div class="p-card" style="margin-bottom:12px">
        <div class="p-card-title">Dados pessoais</div>
        <div id="secDados"></div>
      </div>
      <div class="p-card">
        <div class="p-card-title">Minhas anamneses</div>
        <div id="secAnam"></div>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:16px;padding-bottom:4px">
        AnamneseApp · Portal do Cliente · Dados privados e protegidos
      </div>
    </div>

  </div><!-- /pContent -->

  <!-- Nav bar -->
  <nav class="p-nav">
    <button class="p-nav-btn active" id="nav-treinos" onclick="goPage('treinos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18"/><circle cx="3" cy="6.5" r="1.5"/><circle cx="21" cy="6.5" r="1.5"/><circle cx="3" cy="17.5" r="1.5"/><circle cx="21" cy="17.5" r="1.5"/></svg>
      <span class="p-nav-lbl">Treinos</span>
    </button>
    <button class="p-nav-btn" id="nav-avals" onclick="goPage('avals')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="p-nav-lbl">Avaliações</span>
    </button>
    <button class="p-nav-btn" id="nav-evolucao" onclick="goPage('evolucao')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span class="p-nav-lbl">Evolução</span>
    </button>
    <button class="p-nav-btn" id="nav-metas" onclick="goPage('metas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span class="p-nav-lbl">Metas</span>
    </button>
    <button class="p-nav-btn" id="nav-perfil" onclick="goPage('perfil')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="p-nav-lbl">Perfil</span>
    </button>
  </nav>

</div><!-- /appShell -->

<script>
const _SBU = window.SUPABASE_URL  || '';
const _SBA = window.SUPABASE_ANON || '';
const sb   = (_SBU && _SBA) ? supabase.createClient(_SBU, _SBA) : null;

let _portalChart = null;
let _portalAvals = [];
let _portalPrescs = [];
let _portalPlanActive = {};
let _activePage = 'treinos';

const _METRIC_LBL = {
  peso:'Peso (kg)',gordura:'% Gordura',imc:'IMC (kg/m²)',
  cintura:'Cintura (cm)',vo2max:'VO2 Máx (ml/kg/min)',preensao:'Preensão (kg)'
};
const _CAT_LBL = {peso:'Peso',gordura:'Gordura',circunferencia:'Circunf.',vo2:'VO2',forca:'Força',outro:'Outro'};
const _CAT_CLS = {peso:'gc-peso',gordura:'gc-gordura',circunferencia:'gc-circunferencia',vo2:'gc-vo2',forca:'gc-forca',outro:'gc-outro'};
const _TYPE_LBL = {musculacao:'Musculação',cardio:'Cardio',funcional:'Funcional',pilates:'Pilates',yoga:'Yoga',outro:'Outro'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _show(id){document.getElementById(id).style.display='';}
function _hide(id){document.getElementById(id).style.display='none';}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────
const _PAGE_MAP = {treinos:'pgTreinos',avals:'pgAvals',evolucao:'pgEvolucao',metas:'pgMetas',perfil:'pgPerfil'};
function goPage(name){
  if(_activePage===name) return;
  document.getElementById('pg'+_capitalize(_activePage)).classList.remove('active');
  document.getElementById('nav-'+_activePage).classList.remove('active');
  _activePage = name;
  document.getElementById(_PAGE_MAP[name]).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('pContent').scrollTop = 0;
  if(name==='evolucao' && _portalAvals.length){
    loadPortalChart('peso', document.querySelector('#metricSelP .metric-chip.active'));
  }
}
function _capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ── AUTH ──────────────────────────────────────────────────────────
function showPortalLogin(){
  _hide('loadingScreen');
  _show('loginScreen');
  setTimeout(()=>document.getElementById('loginEmail')?.focus(),100);
}

function portalLogout(){
  localStorage.removeItem('portal_session');
  location.reload();
}

async function doPortalLogin(){
  const email=(document.getElementById('loginEmail').value||'').trim().toLowerCase();
  const senha=(document.getElementById('loginPassword').value||'').trim();
  const msgEl=document.getElementById('loginMsg');
  const btnEl=document.getElementById('btnLogin');
  if(!email||!senha){msgEl.className='portal-login-msg err';msgEl.textContent='Preencha email e senha.';return;}
  btnEl.disabled=true;btnEl.textContent='Entrando…';msgEl.textContent='';
  const {data,error}=await sb.from('clients')
    .select('*').eq('portal_email',email).eq('portal_password',senha).eq('portal_access_enabled',true).maybeSingle();
  if(error||!data){
    btnEl.disabled=false;btnEl.textContent='Entrar';
    msgEl.className='portal-login-msg err';
    msgEl.textContent='Email ou senha incorretos. Verifique seus dados.';
    return;
  }
  const tok=crypto.randomUUID();
  const expires=new Date(Date.now()+30*24*60*60*1000).toISOString();
  await sb.from('clients').update({portal_session:tok,portal_session_expires:expires,portal_last_login:new Date().toISOString()}).eq('id',data.id);
  localStorage.setItem('portal_session',JSON.stringify({clientId:data.id,token:tok,expires}));
  _hide('loginScreen');
  loadPortalContent(data);
}

// ── INIT ─────────────────────────────────────────────────────────
(async()=>{
  if(!sb){showPortalLogin();return;}
  try{
    const saved=JSON.parse(localStorage.getItem('portal_session')||'{}');
    if(saved.token&&saved.expires&&new Date(saved.expires)>new Date()){
      const {data}=await sb.from('clients').select('*')
        .eq('id',saved.clientId).eq('portal_session',saved.token).eq('portal_access_enabled',true).maybeSingle();
      if(data){loadPortalContent(data);return;}
    }
  }catch(e){}
  const urlP=new URLSearchParams(location.search);
  const urlCid=urlP.get('client_id'),urlTok=urlP.get('token');
  if(urlCid&&urlTok){
    const {data}=await sb.from('clients').select('*').eq('id',urlCid).eq('portal_token',urlTok).maybeSingle();
    if(data&&data.portal_token_expires_at&&new Date(data.portal_token_expires_at)>new Date()){loadPortalContent(data);return;}
  }
  showPortalLogin();
})();

// ── LOAD ─────────────────────────────────────────────────────────
async function loadPortalContent(data){
  _hide('loadingScreen');
  document.getElementById('appShell').style.display='flex';
  document.getElementById('pClientName').textContent=data.name||'';
  document.title=`Portal de ${data.name||'Cliente'} — AnamneseApp`;
  const cid=data.id;
  const [avalsRes,metasRes,anamRes,prescRes]=await Promise.all([
    sb.from('assessments').select(`id,created_at,modality,status,notes,
      assessment_biometrics(peso_kg,altura_cm,imc,percentual_gordura_bio),
      assessment_circumferences(cintura_cm,quadril_cm,abdomen_cm,braco_d_cm,braco_e_cm,coxa_d_cm,coxa_e_cm,panturrilha_d_cm,panturrilha_e_cm),
      assessment_skinfolds(percentual_gordura,soma_dobras,protocolo),
      assessment_vo2(vo2max_estimado,classificacao,protocolo),
      assessment_strength(preensao_d_kg,preensao_e_kg,rm_estimado_supino)`)
      .eq('client_id',cid).eq('status','concluida').order('created_at',{ascending:false}),
    sb.from('client_goals').select('*').eq('client_id',cid).eq('status','ativa').order('created_at',{ascending:false}),
    sb.from('anamneses').select('id,created_at,status,mode').eq('client_id',cid).order('created_at',{ascending:false}),
    sb.from('workout_prescriptions').select('*').eq('client_id',cid).eq('status','ativa').order('created_at',{ascending:false})
  ]);
  _portalAvals=avalsRes.data||[];
  _portalPrescs=prescRes.data||[];
  renderQuickStats(_portalAvals,metasRes.data||[]);
  renderTreinos(_portalPrescs);
  renderAvals(_portalAvals);
  renderMetas(metasRes.data||[]);
  renderDados(data);
  renderAnam(anamRes.data||[]);
}

// ── QUICK STATS ───────────────────────────────────────────────────
function renderQuickStats(avals,goals){
  const el=document.getElementById('secQuick');
  if(!el)return;
  const bio=avals[0]?.assessment_biometrics?.[0]||{};
  const skin=avals[0]?.assessment_skinfolds?.[0]||{};
  const peso=bio.peso_kg!=null?parseFloat(bio.peso_kg).toFixed(1):null;
  const gord=skin.percentual_gordura!=null?parseFloat(skin.percentual_gordura).toFixed(1):(bio.percentual_gordura_bio!=null?parseFloat(bio.percentual_gordura_bio).toFixed(1):null);
  const nextGoal=(goals||[]).filter(g=>g.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline))[0];
  const prazoStr=nextGoal?new Date(nextGoal.deadline+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):null;
  if(!peso&&!gord&&!prazoStr){el.style.display='none';return;}
  el.style.display='';
  const qc=(val,unit,lbl)=>val
    ?`<div class="quick-card"><div class="quick-val">${val}</div><div class="quick-unit">${unit}</div><div class="quick-lbl">${lbl}</div></div>`
    :`<div class="quick-card"><div class="quick-val" style="font-size:16px;color:#c8c4bb">—</div><div class="quick-lbl">${lbl}</div></div>`;
  el.innerHTML=qc(peso,'kg','Peso')+qc(gord,'%','% Gordura')+(prazoStr
    ?`<div class="quick-card"><div class="quick-val" style="font-size:18px">${prazoStr}</div><div class="quick-unit" style="color:var(--olive);font-weight:600">meta</div><div class="quick-lbl">Próxima meta</div></div>`
    :`<div class="quick-card"><div class="quick-val" style="font-size:16px;color:#c8c4bb">—</div><div class="quick-lbl">Próxima meta</div></div>`);
}

// ── TREINOS ───────────────────────────────────────────────────────
function _parsePlans(p){
  try{const r=JSON.parse(p.content);if(r?.plans)return r.plans;}catch(e){}
  return [{name:'Treino A',focus:'',color:'#6b7a42',blocks:null,content:p.content}];
}
function _planHtml(plan){
  if(plan.blocks&&plan.blocks.length){
    return plan.blocks.map(blk=>{
      const exs=blk.exercises.filter(e=>e.name&&e.name.trim()).map(ex=>{
        const params=[ex.sets?ex.sets+'×':'',ex.reps||'',ex.load?'@ '+ex.load:'',ex.rest?'↻ '+ex.rest:''].filter(Boolean).join('  ');
        return `<div class="ex-card"><div class="ex-name">${esc(ex.name)}</div>
          ${params?`<div class="ex-params"><span class="ex-param">${esc(params)}</span></div>`:''}
          ${ex.notes?`<div class="ex-notes">${esc(ex.notes)}</div>`:''}</div>`;
      }).join('');
      return `<div class="block-wrap"><div class="block-lbl"><span class="block-bar"></span>${esc(blk.name)}</div>${exs||'<div style="font-size:12px;color:var(--muted)">Nenhum exercício.</div>'}</div>`;
    }).join('');
  }
  // Se content ainda for JSON (legado malformado), tenta extrair texto legível
  let txt=plan.content||'';
  try{
    const r=JSON.parse(txt);
    if(r?.plans) return r.plans.map(pl=>_planHtml(pl)).join('<hr style="border:none;border-top:1px solid #e4e0d8;margin:10px 0">');
  }catch(e){}
  return `<pre style="font-family:monospace;font-size:12px;white-space:pre-wrap;line-height:1.7;color:var(--ink)">${esc(txt)}</pre>`;
}
function renderTreinos(prescs){
  const el=document.getElementById('secTreinos');
  if(!prescs.length){
    el.innerHTML=`<div class="empty-p"><div class="empty-icon">💪</div><div class="empty-title">Nenhum treino ainda</div><div class="empty-sub">Seu personal ainda não adicionou um treino. Aguarde!</div></div>`;
    return;
  }
  el.innerHTML=prescs.map(p=>{
    const plans=_parsePlans(p);
    const from=p.valid_from?new Date(p.valid_from).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}):'';
    const until=p.valid_until?new Date(p.valid_until).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}):'';
    const periodo=[from,until].filter(Boolean).join(' – ');
    const ai=_portalPlanActive[p.id]||0;
    const tabs=plans.length>1?`<div class="plan-tabs">${plans.map((pl,i)=>`<button class="plan-tab${i===ai?' active':''}" onclick="setPortalPlan('${p.id}',${i})">${esc(pl.name)}</button>`).join('')}</div>`:'';
    return `<div class="workout-card">
      <div class="workout-hd">
        <div><div class="workout-title">${esc(p.title)}</div>${periodo?`<div class="workout-periodo">${esc(periodo)}</div>`:''}</div>
        <span class="workout-type">${_TYPE_LBL[p.type]||p.type||'Treino'}</span>
      </div>
      ${tabs}
      <div class="plan-body" id="ppc_${p.id}">${_planHtml(plans[ai]||plans[0])}</div>
    </div>`;
  }).join('');
}
function setPortalPlan(prescId,idx){
  _portalPlanActive[prescId]=idx;
  const p=_portalPrescs.find(x=>x.id===prescId);if(!p)return;
  const plans=_parsePlans(p);
  const body=document.getElementById('ppc_'+prescId);
  if(body)body.innerHTML=_planHtml(plans[idx]||plans[0]);
  const card=body?.closest('.workout-card');
  card?.querySelectorAll('.plan-tab').forEach((btn,i)=>btn.classList.toggle('active',i===idx));
}

// ── AVALIAÇÕES ────────────────────────────────────────────────────
function _imcClass(v){
  if(v<18.5)return['Abaixo do peso','cl-baixo'];
  if(v<25)  return['Eutrófico','cl-normal'];
  if(v<30)  return['Sobrepeso','cl-sobre'];
  return['Obesidade','cl-obesidade'];
}
function _avalBodyHtml(a,i){
  const bio=a.assessment_biometrics?.[0]||{};
  const circ=a.assessment_circumferences?.[0]||{};
  const skin=a.assessment_skinfolds?.[0]||{};
  const vo2=a.assessment_vo2?.[0]||{};
  const str=a.assessment_strength?.[0]||{};
  const gord=skin.percentual_gordura??bio.percentual_gordura_bio;
  const dt=new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const quick=[
    bio.peso_kg!=null?{v:bio.peso_kg,l:'Peso (kg)'}:null,
    bio.imc!=null?{v:parseFloat(bio.imc).toFixed(1),l:'IMC'}:null,
    gord!=null?{v:parseFloat(gord).toFixed(1)+'%',l:'% Gordura'}:null,
    circ.cintura_cm!=null?{v:circ.cintura_cm,l:'Cintura (cm)'}:null,
    vo2.vo2max_estimado!=null?{v:parseFloat(vo2.vo2max_estimado).toFixed(1),l:'VO2 Máx'}:null,
  ].filter(Boolean);
  let h=quick.length?`<div class="quick-metrics">${quick.map(m=>`<div class="qm-item"><div class="qm-val">${m.v}</div><div class="qm-lbl">${m.l}</div></div>`).join('')}</div>`:'';
  // biometria
  if(bio.peso_kg||bio.altura_cm||bio.imc||gord!=null){
    const ic=bio.imc?_imcClass(parseFloat(bio.imc)):null;
    h+=`<div class="meas-sec">Biometria</div><div class="meas-grid">
      ${bio.peso_kg!=null?`<div class="meas-item"><div class="meas-lbl">Peso</div><div class="meas-val">${bio.peso_kg}<span class="meas-unit">kg</span></div></div>`:''}
      ${bio.altura_cm!=null?`<div class="meas-item"><div class="meas-lbl">Altura</div><div class="meas-val">${bio.altura_cm}<span class="meas-unit">cm</span></div></div>`:''}
      ${bio.imc!=null?`<div class="meas-item"><div class="meas-lbl">IMC</div><div class="meas-val">${parseFloat(bio.imc).toFixed(1)}<span class="meas-unit">kg/m²</span></div>${ic?`<div class="meas-classif ${ic[1]}">${ic[0]}</div>`:''}</div>`:''}
      ${gord!=null?`<div class="meas-item"><div class="meas-lbl">% Gordura</div><div class="meas-val">${parseFloat(gord).toFixed(1)}<span class="meas-unit">%</span></div></div>`:''}
    </div>`;
  }
  // circunferências
  const cf=[['cintura_cm','Cintura'],['abdomen_cm','Abdômen'],['quadril_cm','Quadril'],['braco_d_cm','Braço D'],['braco_e_cm','Braço E'],['coxa_d_cm','Coxa D'],['coxa_e_cm','Coxa E'],['panturrilha_d_cm','Panturrilha D'],['panturrilha_e_cm','Panturrilha E']].filter(([k])=>circ[k]!=null);
  if(cf.length) h+=`<div class="meas-sec">Circunferências</div><div class="meas-grid">${cf.map(([k,l])=>`<div class="meas-item"><div class="meas-lbl">${l}</div><div class="meas-val">${circ[k]}<span class="meas-unit">cm</span></div></div>`).join('')}</div>`;
  // dobras
  if(skin.percentual_gordura||skin.soma_dobras) h+=`<div class="meas-sec">Dobras Cutâneas</div><div class="meas-grid">
    ${skin.soma_dobras!=null?`<div class="meas-item"><div class="meas-lbl">Soma</div><div class="meas-val">${parseFloat(skin.soma_dobras).toFixed(1)}<span class="meas-unit">mm</span></div></div>`:''}
    ${skin.percentual_gordura!=null?`<div class="meas-item"><div class="meas-lbl">% Gordura</div><div class="meas-val">${parseFloat(skin.percentual_gordura).toFixed(1)}<span class="meas-unit">%</span></div></div>`:''}
  </div>${skin.protocolo?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Protocolo: ${esc(skin.protocolo)}</div>`:''}`;
  // vo2
  if(vo2.vo2max_estimado) h+=`<div class="meas-sec">Capacidade Cardiorrespiratória</div><div class="meas-grid">
    <div class="meas-item"><div class="meas-lbl">VO2 Máx</div><div class="meas-val">${parseFloat(vo2.vo2max_estimado).toFixed(1)}<span class="meas-unit">ml/kg/min</span></div></div>
    ${vo2.classificacao?`<div class="meas-item"><div class="meas-lbl">Classificação</div><div class="meas-val" style="font-size:13px;font-family:'DM Sans'">${esc(vo2.classificacao)}</div></div>`:''}
  </div>`;
  // força
  if(str.preensao_d_kg||str.preensao_e_kg||str.rm_estimado_supino) h+=`<div class="meas-sec">Força Muscular</div><div class="meas-grid">
    ${str.preensao_d_kg!=null?`<div class="meas-item"><div class="meas-lbl">Preensão D</div><div class="meas-val">${str.preensao_d_kg}<span class="meas-unit">kg</span></div></div>`:''}
    ${str.preensao_e_kg!=null?`<div class="meas-item"><div class="meas-lbl">Preensão E</div><div class="meas-val">${str.preensao_e_kg}<span class="meas-unit">kg</span></div></div>`:''}
    ${str.rm_estimado_supino!=null?`<div class="meas-item"><div class="meas-lbl">1RM Supino est.</div><div class="meas-val">${str.rm_estimado_supino}<span class="meas-unit">kg</span></div></div>`:''}
  </div>`;
  if(a.notes) h+=`<div style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6"><strong>Obs:</strong> ${esc(a.notes)}</div>`;
  h+=`<div><button class="btn-pdf" onclick="downloadAvalPDF(${i},'${dt}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Baixar PDF</button></div>`;
  return h;
}
function renderAvals(avals){
  const el=document.getElementById('secAvals');
  if(!avals.length){el.innerHTML=`<div class="empty-p"><div class="empty-icon">📊</div><div class="empty-title">Nenhuma avaliação</div><div class="empty-sub">Nenhuma avaliação registrada ainda.</div></div>`;return;}
  el.innerHTML=avals.map((a,i)=>{
    const bio=a.assessment_biometrics?.[0]||{};
    const dt=new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    const mod=a.modality==='online'?'Online':'Presencial';
    const pesoStr=bio.peso_kg!=null?' · '+bio.peso_kg+' kg':'';
    return `<div class="aval-item">
      <div class="aval-hd" onclick="toggleAval(${i})">
        <div><div class="aval-date">${dt}${pesoStr}</div><div class="aval-sub">${mod}</div></div>
        <span class="aval-chev" id="chev-${i}">⌄</span>
      </div>
      <div class="aval-body" id="aval-body-${i}"></div>
    </div>`;
  }).join('');
}
function toggleAval(i){
  const body=document.getElementById('aval-body-'+i);
  const chev=document.getElementById('chev-'+i);
  const opening=!body.classList.contains('open');
  body.classList.toggle('open',opening);
  if(chev)chev.classList.toggle('open',opening);
  if(opening&&!body.dataset.loaded){body.dataset.loaded='1';body.innerHTML=_avalBodyHtml(_portalAvals[i],i);}
}
function downloadAvalPDF(i,dt){
  const a=_portalAvals[i];if(!a)return;
  const bio=a.assessment_biometrics?.[0]||{},circ=a.assessment_circumferences?.[0]||{},skin=a.assessment_skinfolds?.[0]||{},vo2=a.assessment_vo2?.[0]||{},str=a.assessment_strength?.[0]||{};
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const OL=[107,122,66],DK=[26,24,20],MD=[122,118,104],LT=[228,224,216];
  const PW=210,ML=16,MR=16;let y=20;
  doc.setFillColor(...OL);doc.rect(0,0,PW,3,'F');
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(...DK);doc.text('RELATÓRIO DE AVALIAÇÃO',PW/2,y+8,{align:'center'});
  doc.setFontSize(11);doc.setFont('helvetica','normal');doc.setTextColor(...MD);doc.text(dt,PW/2,y+16,{align:'center'});y+=28;
  const row=(k,v)=>{if(v==null||v==='')return;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...MD);doc.text(k.toUpperCase(),ML,y);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(...DK);doc.text(String(v),PW-MR,y,{align:'right'});doc.setDrawColor(...LT);doc.setLineWidth(.2);doc.line(ML,y+3,PW-MR,y+3);y+=10;};
  row('Peso',bio.peso_kg?bio.peso_kg+' kg':null);row('Altura',bio.altura_cm?bio.altura_cm+' cm':null);row('IMC',bio.imc?parseFloat(bio.imc).toFixed(1)+' kg/m²':null);
  row('% Gordura (bio)',bio.percentual_gordura_bio?bio.percentual_gordura_bio+'%':null);row('% Gordura (dobras)',skin.percentual_gordura?parseFloat(skin.percentual_gordura).toFixed(1)+'%':null);
  row('Cintura',circ.cintura_cm?circ.cintura_cm+' cm':null);row('Abdômen',circ.abdomen_cm?circ.abdomen_cm+' cm':null);row('Quadril',circ.quadril_cm?circ.quadril_cm+' cm':null);
  row('VO2 Máx',vo2.vo2max_estimado?parseFloat(vo2.vo2max_estimado).toFixed(1)+' ml/kg/min':null);
  row('Preensão D',str.preensao_d_kg?str.preensao_d_kg+' kg':null);row('Preensão E',str.preensao_e_kg?str.preensao_e_kg+' kg':null);row('1RM Supino est.',str.rm_estimado_supino?str.rm_estimado_supino+' kg':null);
  if(a.notes){y+=4;doc.setFontSize(9);doc.setTextColor(...MD);doc.text('OBSERVAÇÕES',ML,y);y+=6;doc.setFontSize(10);doc.setTextColor(...DK);doc.setFont('helvetica','normal');const lines=doc.splitTextToSize(a.notes,PW-ML-MR);doc.text(lines,ML,y);}
  doc.setFillColor(...OL);doc.rect(0,294,PW,3,'F');
  doc.save('avaliacao-'+dt.replace(/\//g,'-')+'.pdf');
}

// ── EVOLUÇÃO ─────────────────────────────────────────────────────
function loadPortalChart(metric,btnEl){
  if(btnEl){document.querySelectorAll('#metricSelP .metric-chip').forEach(b=>b.classList.remove('active'));btnEl.classList.add('active');}
  const canvas=document.getElementById('portalChart');
  const emptyEl=document.getElementById('portalChartEmpty');
  if(!canvas||!emptyEl)return;
  const pts=_portalAvals.map(a=>{
    const bio=a.assessment_biometrics?.[0]||{},circ=a.assessment_circumferences?.[0]||{},skin=a.assessment_skinfolds?.[0]||{},vo2=a.assessment_vo2?.[0]||{},str=a.assessment_strength?.[0]||{};
    let v=null;
    if(metric==='peso')    v=bio.peso_kg??null;
    if(metric==='gordura') v=skin.percentual_gordura??bio.percentual_gordura_bio??null;
    if(metric==='imc')     v=bio.imc??null;
    if(metric==='cintura') v=circ.cintura_cm??null;
    if(metric==='vo2max')  v=vo2.vo2max_estimado??null;
    if(metric==='preensao'){const d=parseFloat(str.preensao_d_kg),e2=parseFloat(str.preensao_e_kg);if(!isNaN(d)&&!isNaN(e2))v=+((d+e2)/2).toFixed(1);else if(!isNaN(d))v=d;else if(!isNaN(e2))v=e2;}
    return v!=null?{date:new Date(a.created_at),val:parseFloat(v)}:null;
  }).filter(Boolean).sort((a,b)=>a.date-b.date);
  if(_portalChart){_portalChart.destroy();_portalChart=null;}
  if(!pts.length){canvas.style.display='none';emptyEl.style.display='block';emptyEl.textContent='Nenhum dado de '+(_METRIC_LBL[metric]||metric)+'.';return;}
  if(pts.length<2){canvas.style.display='none';emptyEl.style.display='block';emptyEl.textContent='Faça pelo menos 2 avaliações para ver a evolução.';return;}
  canvas.style.display='block';emptyEl.style.display='none';
  _portalChart=new Chart(canvas,{type:'line',data:{labels:pts.map(p=>p.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'})),datasets:[{label:_METRIC_LBL[metric]||metric,data:pts.map(p=>p.val),borderColor:'#6b7a42',backgroundColor:'rgba(107,122,66,0.1)',borderWidth:2.5,pointBackgroundColor:'#6b7a42',pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>c[0].label,label:c=>(_METRIC_LBL[metric]||metric)+': '+c.parsed.y}}},scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},color:'#9a9588'}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:11},color:'#9a9588'}}}}});
}

// ── METAS ────────────────────────────────────────────────────────
function renderMetas(goals){
  const el=document.getElementById('secMetas');
  if(!goals.length){el.innerHTML=`<div class="empty-p"><div class="empty-icon">🎯</div><div class="empty-title">Sem metas definidas</div><div class="empty-sub">Seu personal ainda não definiu metas para você.</div></div>`;return;}
  el.innerHTML=goals.map(g=>{
    const base=parseFloat(g.baseline_value)||0,target=parseFloat(g.target_value)||0,cur=parseFloat(g.current_value??g.baseline_value)||0;
    const range=target-base,pct=range===0?null:Math.max(0,Math.min(100,((cur-base)/range)*100));
    const pctR=pct!=null?Math.round(pct):null;
    const fillCls=pct==null?'':pct<30?'gp-low':pct<70?'gp-mid':'gp-high';
    const unit=g.target_unit?' '+g.target_unit:'';
    return `<div class="goal-card">
      <span class="goal-cat ${_CAT_CLS[g.category]||'gc-outro'}">${_CAT_LBL[g.category]||'Outro'}</span>
      <div class="goal-title">${esc(g.title)}</div>
      ${pct!=null?`<div class="prog-bg"><div class="prog-fill ${fillCls}" style="width:${pctR}%"></div></div><div class="prog-vals"><span>Atual: <strong>${cur+unit}</strong></span><span><strong>${pctR}%</strong></span><span>Meta: <strong>${target+unit}</strong></span></div>`:''}
      ${g.deadline?`<div style="font-size:11px;color:var(--muted);margin-top:6px">⏱ Prazo: ${new Date(g.deadline+'T00:00:00').toLocaleDateString('pt-BR')}</div>`:''}
    </div>`;
  }).join('');
}

// ── PERFIL ────────────────────────────────────────────────────────
function renderDados(c){
  const sex={M:'Masculino',F:'Feminino',outro:'Outro'}[c.sex]||'—';
  const dob=c.dob?new Date(c.dob+'T00:00:00').toLocaleDateString('pt-BR'):'—';
  const upd=c.updated_at?new Date(c.updated_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):'—';
  document.getElementById('secDados').innerHTML=`
    <div class="data-row"><span class="data-key">Nome</span><span class="data-val">${esc(c.name)}</span></div>
    ${c.objetivo?`<div class="data-row"><span class="data-key">Objetivo</span><span class="data-val">${esc(c.objetivo)}</span></div>`:''}
    ${c.phone?`<div class="data-row"><span class="data-key">Telefone</span><span class="data-val">${esc(c.phone)}</span></div>`:''}
    ${c.email?`<div class="data-row"><span class="data-key">E-mail</span><span class="data-val">${esc(c.email)}</span></div>`:''}
    <div class="data-row"><span class="data-key">Nascimento</span><span class="data-val">${dob}</span></div>
    <div class="data-row"><span class="data-key">Sexo</span><span class="data-val">${sex}</span></div>
    <div class="data-row"><span class="data-key">Última atualização</span><span class="data-val">${upd}</span></div>`;
}
function renderAnam(anams){
  const el=document.getElementById('secAnam');
  if(!anams.length){el.innerHTML=`<div class="empty-p" style="padding:20px 0"><div class="empty-icon" style="font-size:28px">📋</div><div class="empty-sub">Nenhum questionário registrado.</div></div>`;return;}
  el.innerHTML=anams.map(a=>{
    const st=a.status||'nova';
    const dt=new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    const mod=a.mode==='retorno'?'Retorno':a.mode==='online'?'Online':'Presencial';
    return `<div class="anam-row"><div><div style="font-size:13px;font-weight:500">${dt}</div><div style="font-size:11px;color:var(--muted)">${mod}</div></div><span class="badge-s s-${st}">${{nova:'Nova',lida:'Lida',arquivada:'Arquivada'}[st]||st}</span></div>`;
  }).join('');
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
